<style>

  .g-prompt { font-size:0.62rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:22px; opacity:0; animation:fadeUp 0.8s ease-out 0.95s forwards; }

  .chicha-price { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:600; color:var(--gold); }

</style>

    greet:{morning:'\u0414\u043e\u0431\u0440\u043e\u0435 \u0443\u0442\u0440\u043e',afternoon:'\u0414\u043e\u0431\u0440\u044b\u0439 \u0434\u0435\u043d\u044c',evening:'\u0414\u043e\u0431\u0440\u044b\u0439 \u0432\u0435\u0447\u0435\u0440',night:'\u0414\u043e\u0431\u0440\u043e\u0439 \u043d\u043e\u0447\u0438'}, locale:'ru-RU',
    sections:{ food:'\u041f\u0430\u0441\u0442\u0430 \u0438 \u0437\u0430\u043a\u0443\u0441\u043a\u0438', pizza:'\u041f\u0438\u0446\u0446\u0430', chicha:'\u041a\u0430\u043b\u044c\u044f\u043d', drinks:'\u041d\u0430\u043f\u0438\u0442\u043a\u0438' },
    flavorsLabel:'\u0414\u043e\u0441\u0442\u0443\u043f\u043d\u044b\u0435 \u0432\u043a\u0443\u0441\u044b', cold:'\u0425\u043e\u043b\u043e\u0434\u043d\u044b\u0435', hot:'\u0413\u043e\u0440\u044f\u0447\u0438\u0435', change:'\u0417\u0430\u043c\u0435\u043d\u0430', chichaQ:'\u0427\u0430\u0448\u0430 Quasar', chichaA:'\u0427\u0430\u0448\u0430 Aluminium',
    items:{ food:[['\u041f\u0430\u0441\u0442\u0430 \u0430\u0440\u0440\u0430\u0431\u044c\u044f\u0442\u0430','110 Dh'],['\u041f\u0430\u0441\u0442\u0430 \u0441 \u0442\u043e\u043c\u0430\u0442\u043d\u044b\u043c \u0441\u043e\u0443\u0441\u043e\u043c','100 Dh'],['\u041f\u0430\u0441\u0442\u0430 \u0431\u043e\u043b\u043e\u043d\u044c\u0435\u0437\u0435','110 Dh'],['\u041f\u0430\u0441\u0442\u0430 \u0441 \u043a\u0443\u0440\u0438\u0446\u0435\u0439','110 Dh'],['\u0421\u044d\u043d\u0434\u0432\u0438\u0447 \u043a\u0435\u0431\u0430\u0431','100 Dh']],
      pizza:[['\u041f\u0438\u0446\u0446\u0430 \u041c\u0430\u0440\u0433\u0430\u0440\u0438\u0442\u0430','90 Dh'],['\u041f\u0438\u0446\u0446\u0430 \u0441 \u0442\u0443\u043d\u0446\u043e\u043c','110 Dh'],['\u041f\u0438\u0446\u0446\u0430 \u041e\u0440\u0438\u0435\u043d\u0442\u0430\u043b','120 Dh'],['\u041f\u0438\u0446\u0446\u0430 \u043a\u0435\u0431\u0430\u0431','120 Dh'],['\u041f\u0438\u0446\u0446\u0430 \u0424\u0435\u0440\u043c\u0435\u0440\u0441\u043a\u0430\u044f','120 Dh']],
      cold:[['\u0410\u0439\u0441 \u0442\u0438 \u00b7 \u041a\u043e\u043a\u0430 \u00b7 \u041a\u043e\u043a\u0430 \u0417\u0435\u0440\u043e \u00b7 \u0425\u0430\u0432\u0430\u0439 \u00b7 \u041f\u043e\u043c\u0441 \u00b7 \u041e\u0440\u0430\u043d\u0436\u0438\u043d\u0430','30 Dh'],['\u0421\u0438\u0434\u0438 \u0410\u043b\u0438 \u00b7 \u0423\u044d\u043b\u044c\u043c\u0435\u0441','25 Dh']],
      hot:[['\u041c\u044f\u0442\u043d\u044b\u0439 \u0447\u0430\u0439 \u00b7 \u041a\u043e\u0444\u0435','30 Dh'],['\u041a\u043e\u0444\u0435 \u043d\u043e\u0441-\u043d\u043e\u0441','35 Dh']] } }
};
const CHICHA = { quasar:'150 Dh', alu:'100 Dh', change:'50 Dh' };
const FLAVORS = [['Adalya','Love \u00b7 Hawa\u00ef \u00b7 Mi Amor'],['Al Fakher','Menthe \u00b7 Pomme']];

function getDaypart(h){ if(h>=5&&h<12)return'morning'; if(h>=12&&h<17)return'afternoon'; if(h>=17&&h<22)return'evening'; return'night'; }
function updateGreeting(lang){
  const now=new Date(), t=T[lang], part=getDaypart(now.getHours());
  document.getElementById('greetingText').textContent=t.greet[part];
  const timeStr=now.toLocaleTimeString(t.locale,{hour:'2-digit',minute:'2-digit'});
  const dateStr=now.toLocaleDateString(t.locale,{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('greetingTime').textContent=dateStr+' \u00b7 '+timeStr;
}
updateGreeting('en');
setInterval(()=>{ if(document.getElementById('greeting').classList.contains('active'))updateGreeting('en'); },1000);

let currentLang='en';
function selectLang(lang){
  currentLang=lang; const t=T[lang];
  document.body.classList.toggle('rtl',t.rtl);
  document.documentElement.lang=lang;
  document.getElementById('tagline').textContent=t.tagline;
  document.getElementById('footerText').textContent=t.welcome;
  document.getElementById('currentLangLabel').textContent=t.code;
  renderMenu(lang); closeLangPicker();
  document.getElementById('greeting').classList.remove('active');
  document.getElementById('menu').classList.add('active');
  window.scrollTo(0,0);
}
function rows(arr){ return arr.map(([n,p])=>`<div class="item"><span class="item-name">${n}</span><div class="item-dots"></div><span class="item-price">${p}</span></div>`).join(''); }
function renderMenu(lang){
  const t=T[lang];
  document.getElementById('menuContent').innerHTML=`
    <div class="section"><div class="section-header open" onclick="toggle(this)"><span class="section-icon">\ud83c\udf5d</span><span class="section-title">${t.sections.food}</span><div class="chevron"></div></div><div class="section-body open">${rows(t.items.food)}</div></div>
    <div class="section"><div class="section-header open" onclick="toggle(this)"><span class="section-icon">\ud83c\udf55</span><span class="section-title">${t.sections.pizza}</span><div class="chevron"></div></div><div class="section-body open">${rows(t.items.pizza)}</div></div>
    <div class="section"><div class="section-header open" onclick="toggle(this)"><span class="section-icon">\ud83d\udca8</span><span class="section-title">${t.sections.chicha}</span><div class="chevron"></div></div><div class="section-body open">
      <div class="chicha-grid">
        <div class="chicha-type"><div><div class="chicha-name">${t.chichaQ}</div><div class="chicha-change">${t.change} \u2014 ${CHICHA.change}</div></div><div class="chicha-price">${CHICHA.quasar}</div></div>
        <div class="chicha-type"><div><div class="chicha-name">${t.chichaA}</div><div class="chicha-change">${t.change} \u2014 ${CHICHA.change}</div></div><div class="chicha-price">${CHICHA.alu}</div></div>
      </div>
      <div class="flavors-block"><div class="flavors-label">${t.flavorsLabel}</div>${FLAVORS.map(([b,f])=>`<div class="flavor-brand"><strong>${b}</strong> \u2014 ${f}</div>`).join('')}</div>
    </div></div>
    <div class="section"><div class="section-header open" onclick="toggle(this)"><span class="section-icon">\ud83e\udd64</span><span class="section-title">${t.sections.drinks}</span><div class="chevron"></div></div><div class="section-body open">
      <div class="sub-label">${t.cold}</div>${rows(t.items.cold)}<div class="sub-label">${t.hot}</div>${rows(t.items.hot)}
    </div></div>`;
}
function toggle(header){ const body=header.nextElementSibling, open=header.classList.contains('open'); header.classList.toggle('open',!open); body.classList.toggle('open',!open); }
function openLangPicker(){ document.getElementById('langOverlay').classList.add('show'); }
function closeLangPicker(){ document.getElementById('langOverlay').classList.remove('show'); }
</script>
